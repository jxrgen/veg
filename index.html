<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markplan for Grøntsagsordningen i AiH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-page: #f3f4f6;
            --bg-card: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --text-highlight-bg: #facc15;
            --text-highlight-border: #eab308;
            --bed-bg: #eff6ff;
            --bed-border: #d1d5db;
            --crop-item-bg: #e6f0ff;
            --crop-item-text: #1a56cc;
            --crop-item-hover-bg: #d1e4ff;
            --accent-color: #10b981;
            --accent-hover-color: #059669;
            --main-title-color: #047857;
            --section-title-color: #065f46;
            --locked-color: #ef4444;
            --unlocked-color: #22c55e;
            --bed-locked-bg: #fef2f2;
            --bed-locked-border: #fecaca;
            --bed-unlocked-bg: #f0fdf4;
            --bed-unlocked-border: #bbf7d0;
        }

        body.theme-sunlight {
            --bg-page: #666666;
            --bg-card: #555555;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --text-highlight-bg: #ffff00;
            --text-highlight-border: #eab308;
            --bed-bg: #444444;
            --bed-border: #777777;
            --crop-item-bg: #333333;
            --crop-item-text: #ffffff;
            --crop-item-hover-bg: #666666;
            --accent-color: #000000;
            --main-title-color: #000000;
            --section-title-color: #000000;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-page);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
        h1 { color: var(--main-title-color); }
        h2, h3 { color: var(--section-title-color); }
        
        .crop-item {
            cursor: pointer;
            padding: 0.5rem;
            margin-bottom: 0.25rem;
            border-radius: 0.5rem;
            transition: background-color 0.2s ease-in-out;
            background-color: var(--crop-item-bg);
            color: var(--crop-item-text);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .crop-item:hover { background-color: var(--crop-item-hover-bg); }
        .crop-item.locked { border-left: 3px solid var(--locked-color); }
        .crop-item.unlocked { border-left: 3px solid var(--unlocked-color); }
        .crop-item.selected { border: 2px solid #eab308; }
        .crop-name { font-weight: 600; font-size: 1.1rem; }
        .crop-status { font-size: 0.9rem; }

        .field-section {
            background-color: var(--bg-card);
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 0.5rem;
            padding: 1rem;
        }
        
        .bed {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 55px;
            border: 1px solid var(--bed-border);
            border-radius: 0.5rem;
            background-color: var(--bed-bg);
            font-size: 0.875rem;
            text-align: center;
            overflow: hidden;
            position: relative;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        .bed.locked { background-color: var(--bed-locked-bg); border-color: var(--bed-locked-border); }
        .bed.unlocked { background-color: var(--bed-unlocked-bg); border-color: var(--bed-unlocked-border); }
        
        .bed-number {
            font-weight: bold;
            color: var(--text-secondary);
            position: absolute;
            top: 2px;
            left: 3px;
            font-size: 0.65rem;
        }
        
        .bed-group {
            position: absolute;
            top: 2px;
            right: 3px;
            font-size: 0.55rem;
            font-weight: bold;
            background-color: #f97316;
            color: white;
            padding: 0 3px;
            border-radius: 0.25rem;
            display: none;
        }
        .bed-group.visible { display: block; }
        
        body.theme-sunlight .bed-group { color: black; }
        
        .bed-crop {
            color: var(--text-primary);
            font-size: 0.7rem;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            word-wrap: break-word;
            padding: 0 2px;
        }
        
        .status-icon { font-size: 0.65rem; margin-left: 2px; }
        
        .highlight {
            background-color: var(--text-highlight-bg) !important;
            border-color: var(--text-highlight-border) !important;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.03); } }
        
        .to-top-link {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1.5rem;
            margin-bottom: 2rem;
            color: var(--accent-color);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            width: 100%;
        }
        .to-top-link:hover { color: var(--accent-hover-color); }
        .to-top-link svg { margin-right: 0.5rem; }

        .top-controls-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--bed-border);
        }
        
        .sun-mode-button {
            width: 40px;
            height: 40px;
            background-color: var(--crop-item-bg);
            border: 1px solid var(--bed-border);
            border-radius: 0.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease-in-out;
            color: var(--crop-item-text);
        }
        .sun-mode-button:hover { background-color: var(--crop-item-hover-bg); transform: translateY(-2px); }
        .sun-mode-button svg { width: 24px; height: 24px; fill: currentColor; }
        .sun-mode-button.active { background-color: var(--text-highlight-bg); border-color: var(--text-highlight-border); color: var(--text-primary); }
        .sun-mode-button.active svg { fill: #000000; }
        
        .settings-button {
            width: 40px;
            height: 40px;
            background-color: var(--crop-item-bg);
            border: 1px solid var(--bed-border);
            border-radius: 0.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 0.5rem;
            color: var(--crop-item-text);
        }
        .settings-button:hover { background-color: var(--crop-item-hover-bg); }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 100;
            overflow-y: auto;
        }
        .modal.show { display: flex; align-items: center; justify-content: center; }
        .modal-content {
            background-color: var(--bg-card);
            padding: 1.5rem;
            border-radius: 0.75rem;
            max-width: 90%;
            max-height: 90%;
            overflow-y: auto;
        }
        .modal h2 { margin-bottom: 1rem; }
        .close-btn {
            float: right;
            cursor: pointer;
            font-size: 1.5rem;
            line-height: 1;
        }
        .setting-group { margin-bottom: 1rem; }
        .setting-label { display: block; font-weight: 600; margin-bottom: 0.5rem; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .checkbox-item {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--bed-border);
            border-radius: 0.5rem;
            cursor: pointer;
            background-color: var(--crop-item-bg);
            color: var(--crop-item-text);
        }
        .checkbox-item.checked { background-color: var(--accent-color); color: white; }
        
        .save-btn {
            background-color: var(--accent-color);
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            margin-top: 1rem;
        }
        .save-btn:hover { background-color: var(--accent-hover-color); }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const body = document.body;
            const cropListContent = document.getElementById('cropListContent');
            const sectionT = document.getElementById('section-T');
            const sectionM = document.getElementById('section-M');
            const sectionB = document.getElementById('section-B');
            const emojiLeft = document.getElementById('emoji-left');
            const emojiRight = document.getElementById('emoji-right');
            const sunModeButton = document.getElementById('sunModeButton');
            const settingsButton = document.getElementById('settingsButton');
            const settingsModal = document.getElementById('settingsModal');
            const closeModal = document.getElementById('closeModal');
            const saveSettings = document.getElementById('saveSettings');
            const groupCheckboxes = document.getElementById('groupCheckboxes');
            const cropCheckboxes = document.getElementById('cropCheckboxes');
            const topEmojiT = document.getElementById('top-emoji-T');
            const topEmojiM = document.getElementById('top-emoji-M');
            const topEmojiB = document.getElementById('top-emoji-B');

            let parsedFieldData = [];
            let cropLocations = {};
            let groupCrops = {};
            let allGroups = [];
            let userSettings = { selectedGroup: '', favoriteCrops: [] };
            
            const vegetableEmojis = ['🌸', '🫘', '🍄‍🟫', '🫛', '🥕', '🫚', '🧅', '🧄', '🥔', '🥒', '🥬', '🥦', '🍄', '🌶️', '🌽', '🍅', '🫑', '🍓', '🍑', '🍎', '🍐', '🥭', '🍊', '🍉', '🦋', '🐛', '🐝', '🪳', '🦗', '🪱', '🕷️', '🦠', '🐞', '🪲', '🌱', '🪻', '🌼', '🌷', '🌻', '🌺', '🌹', '🏵️', '🌿', '🌤️', '🌧️', '🌞', '🌈', '💧'];

            function loadSettings() {
                const saved = localStorage.getItem('markplanSettings');
                if (saved) userSettings = JSON.parse(saved);
            }

            function saveSettingsFunc() {
                localStorage.setItem('markplanSettings', JSON.stringify(userSettings));
                settingsModal.classList.remove('show');
                renderFieldOverview();
            }

            function getRandomEmoji() { return vegetableEmojis[Math.floor(Math.random() * vegetableEmojis.length)]; }
            function setRandomEmojis() {
                emojiLeft.textContent = getRandomEmoji();
                emojiRight.textContent = getRandomEmoji();
                topEmojiT.textContent = getRandomEmoji();
                topEmojiM.textContent = getRandomEmoji();
                topEmojiB.textContent = getRandomEmoji();
            }

            function getStatusIcon(frigivet) { return frigivet === '1' ? '✅' : '🔒'; }

            async function fetchCsvData(url) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP fejl! status: ${response.status}`);
                    const text = await response.text();
                    return parseCsv(text);
                } catch (error) {
                    console.error("Fejl ved indlæsning:", error);
                    cropListContent.innerHTML = '<div class="text-red-600 text-center py-4">Kunne ikke indlæse markplanen.</div>';
                    return [];
                }
            }

            function parseCsv(csvText) {
                const lines = csvText.trim().split('\n');
                if (lines.length === 0) return [];
                const headers = lines[0].split(',').map(h => h.trim());
                return lines.slice(1).map(line => {
                    const values = line.split(',').map(v => v.trim());
                    return headers.reduce((obj, h, i) => ({ ...obj, [h]: values[i] || '' }), {});
                });
            }

            function processFieldData(data) {
                cropLocations = {};
                groupCrops = {};
                allGroups = [];
                parsedFieldData = data;

                data.forEach(row => {
                    const bedNum = parseInt(row.Bed);
                    const grupo = row.Lugegruppe || '';
                    const frigivet = row.Frigivet || '0';
                    
                    if (grupo && !allGroups.includes(grupo)) allGroups.push(grupo);
                    
                    const addCropLocation = (section, cropName, bedNumber, frigivet) => {
                        if (cropName && cropName !== 'Brak') {
                            if (!cropLocations[cropName]) cropLocations[cropName] = { T: [], M: [], B: [], frigivet: frigivet };
                            cropLocations[cropName][section].push({ bed: bedNumber, frigivet });
                            
                            if (grupo) {
                                if (!groupCrops[grupo]) groupCrops[grupo] = [];
                                groupCrops[grupo].push({ bed: bedNumber, section, crop: cropName });
                            }
                        }
                    };

                    addCropLocation('T', row.Top, bedNum, frigivet);
                    addCropLocation('M', row.Midt, bedNum, frigivet);
                    addCropLocation('B', row.Bund, bedNum, frigivet);
                });

                allGroups.sort((a, b) => parseInt(a) - parseInt(b));
                for (const cropName in cropLocations) {
                    ['T', 'M', 'B'].forEach(s => cropLocations[cropName][s].sort((a, b) => a.bed - b.bed));
                }
            }

            function renderCropList() {
                cropListContent.innerHTML = '';
                const sortedCropNames = Object.keys(cropLocations).sort();
                if (sortedCropNames.length === 0) {
                    cropListContent.innerHTML = '<div class="text-center py-4 text-gray-500">Ingen afgrøder fundet.</div>';
                    return;
                }

                sortedCropNames.forEach(cropName => {
                    const loc = cropLocations[cropName];
                    const frigivet = loc.frigivet;
                    const statusIcon = getStatusIcon(frigivet);
                    const isFavorite = userSettings.favoriteCrops.includes(cropName);
                    
                    const locations = [...new Set([...loc.T, ...loc.M, ...loc.B])];
                    const beds = locations.map(l => l.bed || l);
                    
                    const div = document.createElement('div');
                    let classes = 'crop-item ' + (frigivet === '1' ? 'unlocked' : 'locked');
                    if (isFavorite) classes += ' selected';
                    div.className = classes;
                    div.innerHTML = `
                        <span class="crop-name">${cropName}</span>
                        <span class="crop-status">${statusIcon} (${beds.join(', ')})</span>
                    `;
                    div.dataset.cropName = cropName;
                    div.addEventListener('click', () => highlightCropInField(cropName));
                    cropListContent.appendChild(div);
                });
            }

            function renderFieldOverview() {
                sectionT.innerHTML = '';
                sectionM.innerHTML = '';
                sectionB.innerHTML = '';

                const maxBedNum = parsedFieldData.reduce((max, row) => Math.max(max, parseInt(row.Bed || 0)), 0);
                const selectedGroup = userSettings.selectedGroup;

                for (let i = 1; i <= maxBedNum; i++) {
                    const bedData = parsedFieldData.find(row => parseInt(row.Bed) === i);
                    if (bedData) {
                        sectionT.appendChild(createBedElement('T', i, bedData.Top, bedData.Lugegruppe, bedData.Frigivet, selectedGroup));
                        sectionM.appendChild(createBedElement('M', i, bedData.Midt, bedData.Lugegruppe, bedData.Frigivet, selectedGroup));
                        sectionB.appendChild(createBedElement('B', i, bedData.Bund, bedData.Lugegruppe, bedData.Frigivet, selectedGroup));
                    }
                }
            }

            function createBedElement(section, bedNum, cropName, grupo, frigivet, selectedGroup) {
                const div = document.createElement('div');
                div.id = `bed-${section}-${bedNum}`;
                const locked = frigivet !== '1';
                div.className = 'bed ' + (locked ? 'locked' : 'unlocked');
                div.dataset.section = section;
                div.dataset.bedNum = bedNum;
                div.dataset.cropName = cropName;
                div.dataset.frigivet = frigivet;
                
                const statusIcon = getStatusIcon(frigivet);
                const displayCrop = cropName && cropName !== 'Brak' ? `${cropName}<span class="status-icon">${statusIcon}</span>` : '';
                
                const showGroup = selectedGroup && grupo === selectedGroup;
                
                div.innerHTML = `
                    <span class="bed-number">${bedNum}</span>
                    ${grupo ? `<span class="bed-group ${showGroup ? 'visible' : ''}">G${grupo}</span>` : ''}
                    <span class="bed-crop">${displayCrop}</span>
                `;
                return div;
            }

            function highlightCropInField(cropName) {
                document.querySelectorAll('.bed.highlight').forEach(b => b.classList.remove('highlight'));
                
                const loc = cropLocations[cropName];
                if (!loc) return;
                
                let first = null;
                ['T', 'M', 'B'].forEach(s => {
                    loc[s].forEach(item => {
                        const el = document.getElementById(`bed-${s}-${item.bed || item}`);
                        if (el) {
                            el.classList.add('highlight');
                            if (!first) first = el;
                        }
                    });
                });
                if (first) first.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            function toggleSunlightMode() {
                if (body.classList.contains('theme-sunlight')) {
                    body.classList.remove('theme-sunlight');
                    body.classList.add('theme-default');
                    localStorage.setItem('sunlightMode', 'inactive');
                    sunModeButton.classList.remove('active');
                } else {
                    body.classList.remove('theme-default');
                    body.classList.add('theme-sunlight');
                    localStorage.setItem('sunlightMode', 'active');
                    sunModeButton.classList.add('active');
                }
            }

            function openSettings() {
                groupCheckboxes.innerHTML = '';
                allGroups.forEach(grupo => {
                    const label = document.createElement('div');
                    label.className = 'checkbox-item' + (userSettings.selectedGroup === grupo ? ' checked' : '');
                    label.textContent = 'G' + grupo;
                    label.dataset.grupo = grupo;
                    label.addEventListener('click', () => {
                        document.querySelectorAll('#groupCheckboxes .checkbox-item').forEach(c => c.classList.remove('checked'));
                        if (userSettings.selectedGroup === grupo) {
                            userSettings.selectedGroup = '';
                        } else {
                            label.classList.add('checked');
                            userSettings.selectedGroup = grupo;
                        }
                    });
                    groupCheckboxes.appendChild(label);
                });
                
                cropCheckboxes.innerHTML = '';
                const sortedCrops = Object.keys(cropLocations).sort();
                sortedCrops.forEach(cropName => {
                    const label = document.createElement('div');
                    const isChecked = userSettings.favoriteCrops.includes(cropName);
                    label.className = 'checkbox-item' + (isChecked ? ' checked' : '');
                    label.textContent = cropName;
                    label.dataset.crop = cropName;
                    label.addEventListener('click', () => {
                        if (userSettings.favoriteCrops.includes(cropName)) {
                            userSettings.favoriteCrops = userSettings.favoriteCrops.filter(c => c !== cropName);
                            label.classList.remove('checked');
                        } else {
                            userSettings.favoriteCrops.push(cropName);
                            label.classList.add('checked');
                        }
                    });
                    cropCheckboxes.appendChild(label);
                });
                
                settingsModal.classList.add('show');
            }

            sunModeButton.addEventListener('click', toggleSunlightMode);
            settingsButton.addEventListener('click', openSettings);
            closeModal.addEventListener('click', () => settingsModal.classList.remove('show'));
            saveSettings.addEventListener('click', saveSettingsFunc);

            async function init() {
                loadSettings();
                setRandomEmojis();
                
                const savedSunlightMode = localStorage.getItem('sunlightMode') || 'inactive';
                if (savedSunlightMode === 'active') {
                    body.classList.add('theme-sunlight');
                    sunModeButton.classList.add('active');
                } else {
                    body.classList.add('theme-default');
                }

                const data = await fetchCsvData('markplan_aih.csv');
                if (data.length > 0) {
                    processFieldData(data);
                    renderCropList();
                    renderFieldOverview();
                }
            }

            init();
        });
    </script>
</body>
</html>
