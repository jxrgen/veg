<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markplan for Grøntsagsordningen i AiH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-page: #f3f4f6;
            --bg-card: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --text-highlight-bg: #facc15;
            --text-highlight-border: #eab308;
            --bed-bg: #eff6ff;
            --bed-border: #d1d5db;
            --crop-item-bg: #e6f0ff;
            --crop-item-text: #1a56cc;
            --crop-item-hover-bg: #d1e4ff;
            --accent-color: #10b981;
            --accent-hover-color: #059669;
            --main-title-color: #047857;
            --section-title-color: #065f46;
            --locked-color: #ef4444;
            --unlocked-color: #22c55e;
        }

        body.theme-sunlight {
            --bg-page: #666666;
            --bg-card: #555555;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --text-highlight-bg: #ffff00;
            --text-highlight-border: #eab308;
            --bed-bg: #444444;
            --bed-border: #777777;
            --crop-item-bg: #333333;
            --crop-item-text: #ffffff;
            --crop-item-hover-bg: #666666;
            --accent-color: #000000;
            --main-title-color: #000000;
            --section-title-color: #000000;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-page);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
        h1 { color: var(--main-title-color); }
        h2, h3 { color: var(--section-title-color); }
        #cropList h2 { font-size: 1.125rem; margin: 0; padding: 0; }
        
        .crop-item {
            cursor: pointer;
            padding: 0.5rem;
            margin-bottom: 0.25rem;
            border-radius: 0.5rem;
            transition: background-color 0.2s ease-in-out;
            background-color: var(--crop-item-bg);
            color: var(--crop-item-text);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .crop-item:hover { background-color: var(--crop-item-hover-bg); }
        
        .crop-name { font-weight: 600; font-size: 1.1rem; }
        .crop-status { font-size: 0.9rem; }

        .field-section {
            background-color: var(--bg-card);
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 0.5rem;
            padding: 1rem;
        }
        
        .bed {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 55px;
            border: 1px solid var(--bed-border);
            border-radius: 0.5rem;
            background-color: var(--bed-bg);
            font-size: 0.875rem;
            text-align: center;
            overflow: hidden;
            position: relative;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        
        .bed-number {
            font-weight: bold;
            color: var(--text-secondary);
            position: absolute;
            top: 2px;
            left: 3px;
            font-size: 0.65rem;
        }
        
        .bed-group {
            position: absolute;
            top: 2px;
            right: 3px;
            font-size: 0.55rem;
            font-weight: bold;
            background-color: #f97316;
            color: white;
            padding: 0 3px;
            border-radius: 0.25rem;
        }
        
        body.theme-sunlight .bed-group { color: black; }
        
        .bed-crop {
            color: var(--text-primary);
            font-size: 0.7rem;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            word-wrap: break-word;
            padding: 0 2px;
        }
        
        .status-icon {
            font-size: 0.65rem;
            margin-left: 2px;
        }
        
        .highlight {
            background-color: var(--text-highlight-bg);
            border-color: var(--text-highlight-border);
            animation: pulse 1s infinite alternate;
        }

        body.theme-sunlight .bed.highlight .bed-number,
        body.theme-sunlight .bed.highlight .bed-crop { color: #000000; }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.03); } }
        
        .to-top-link {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1.5rem;
            margin-bottom: 2rem;
            color: var(--accent-color);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            width: 100%;
        }
        .to-top-link:hover { color: var(--accent-hover-color); }
        .to-top-link svg { margin-right: 0.5rem; }

        .section-container h3 { text-align: center; }

        .top-controls-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--bed-border);
        }
        
        .sun-mode-button {
            width: 40px;
            height: 40px;
            background-color: var(--crop-item-bg);
            border: 1px solid var(--bed-border);
            border-radius: 0.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease-in-out;
            color: var(--crop-item-text);
        }
        .sun-mode-button:hover {
            background-color: var(--crop-item-hover-bg);
            transform: translateY(-2px);
        }
        .sun-mode-button svg { width: 24px; height: 24px; fill: currentColor; }
        
        .sun-mode-button.active {
            background-color: var(--text-highlight-bg);
            border-color: var(--text-highlight-border);
            color: var(--text-primary);
        }
        .sun-mode-button.active svg { fill: #000000; }
        
        .group-list {
            background-color: var(--bg-card);
            border-radius: 0.75rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 theme-default" id="top">
    <div class="container py-6">
        <h1 class="text-3xl font-bold text-center mb-8">
            <span id="emoji-left"></span> Markplan for Grøntsagsordningen i AiH <span id="emoji-right"></span>
        </h1>

        <section id="cropList" class="mb-12 p-6 bg-white rounded-lg shadow-lg">
            <div class="top-controls-container">
                <h2 class="font-semibold text-lg">T = Top, M = Midt, B = Bund</h2>
                <button id="sunModeButton" class="sun-mode-button" title="Skift til sollys-tilstand">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M8 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6m0 1a4 4 0 1 1 0-8 4 4 0 0 1 0 8M8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0m0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13M2.343 2.343a.5.5 0 0 1 .707 0l1.414 1.414a.5.5 0 0 1-.707.707L2.343 3.05a.5.5 0 0 1 0-.707m11.314 11.314a.5.5 0 0 1 0-.707l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707M.5 8a.5.5 0 0 1 0-1h2a.5.5 0 0 1 0 1zm13 0a.5.5 0 0 1 0-1h2a.5.5 0 0 1 0 1M3.757 12.243a.5.5 0 0 1-.707 0L2.343 10.829a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707m11.314-11.314a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707"/>
                    </svg>
                </button>
            </div>
            <div id="cropListContent" class="space-y-2 mt-4">
                <div class="text-center py-4 text-gray-500">Indlæser markplan...</div>
            </div>
        </section>

        <section id="groupSection" class="mb-12 p-6 bg-white rounded-lg shadow-lg">
            <h2 class="text-xl font-semibold mb-4">Lugegrupper</h2>
            <div id="groupListContent" class="grid grid-cols-2 md:grid-cols-4 gap-2"></div>
        </section>

        <section id="fieldOverview" class="mb-12 p-6 bg-white rounded-lg shadow-lg">
            <h2 class="text-2xl font-semibold mb-6">Grafisk Markoversigt</h2>
            <div id="fieldContent" class="space-y-8">
                <div class="section-container">
                    <h3 class="text-xl font-medium mb-2 text-center">Top-afsnit</h3>
                    <div id="section-T" class="field-section"></div>
                    <a href="#top" class="to-top-link">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 10l7-7m0 0l7 7m-7-7v18" />
                        </svg>
                        Til toppen <span class="ml-2" id="top-emoji-T"></span>
                    </a>
                </div>

                <div class="section-container mt-8">
                    <h3 class="text-xl font-medium mb-2 text-center">Midt-afsnit</h3>
                    <div id="section-M" class="field-section"></div>
                    <a href="#top" class="to-top-link">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 10l7-7m0 0l7 7m-7-7v18" />
                        </svg>
                        Til toppen <span class="ml-2" id="top-emoji-M"></span>
                    </a>
                </div>

                <div class="section-container mt-8">
                    <h3 class="text-xl font-medium mb-2 text-center">Bund-afsnit</h3>
                    <div id="section-B" class="field-section"></div>
                    <a href="#top" class="to-top-link">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 10l7-7m0 0l7 7m-7-7v18" />
                        </svg>
                        Til toppen <span class="ml-2" id="top-emoji-B"></span>
                    </a>
                </div>
            </div>
        </section>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const body = document.body;
            const cropListContent = document.getElementById('cropListContent');
            const groupListContent = document.getElementById('groupListContent');
            const sectionT = document.getElementById('section-T');
            const sectionM = document.getElementById('section-M');
            const sectionB = document.getElementById('section-B');
            const emojiLeft = document.getElementById('emoji-left');
            const emojiRight = document.getElementById('emoji-right');
            const sunModeButton = document.getElementById('sunModeButton');
            const topEmojiT = document.getElementById('top-emoji-T');
            const topEmojiM = document.getElementById('top-emoji-M');
            const topEmojiB = document.getElementById('top-emoji-B');

            let parsedFieldData = [];
            let cropLocations = {};
            let groupCrops = {};
            
            const vegetableEmojis = ['🌸', '🫘', '🍄‍🟫', '🫛', '🥕', '🫚', '🧅', '🧄', '🥔', '🥒', '🥬', '🥦', '🍄', '🌶️', '🌽', '🍅', '🫑', '🍓', '🍑', '🍎', '🍐', '🥭', '🍊', '🍉', '🦋', '🐛', '🐝', '🪳', '🦗', '🪱', '🕷️', '🦠', '🐞', '🪲', '🌱', '🪻', '🌼', '🌷', '🌻', '🌺', '🌹', '🏵️', '🌿', '🌤️', '🌧️', '🌞', '🌈', '💧'];

            function getRandomEmoji() { return vegetableEmojis[Math.floor(Math.random() * vegetableEmojis.length)]; }
            function setRandomEmojis() {
                emojiLeft.textContent = getRandomEmoji();
                emojiRight.textContent = getRandomEmoji();
                topEmojiT.textContent = getRandomEmoji();
                topEmojiM.textContent = getRandomEmoji();
                topEmojiB.textContent = getRandomEmoji();
            }

            function getStatusIcon(frigivet) { return frigivet === '1' ? '✅' : '🔒'; }
            function getStatusText(frigivet) { return frigivet === '1' ? 'Kan høstes' : 'Låst'; }

            async function fetchCsvData(url) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP fejl! status: ${response.status}`);
                    const text = await response.text();
                    return parseCsv(text);
                } catch (error) {
                    console.error("Fejl ved indlæsning:", error);
                    cropListContent.innerHTML = '<div class="text-red-600 text-center py-4">Kunne ikke indlæse markplanen.</div>';
                    return [];
                }
            }

            function parseCsv(csvText) {
                const lines = csvText.trim().split('\n');
                if (lines.length === 0) return [];
                const headers = lines[0].split(',').map(h => h.trim());
                return lines.slice(1).map(line => {
                    const values = line.split(',').map(v => v.trim());
                    return headers.reduce((obj, h, i) => ({ ...obj, [h]: values[i] || '' }), {});
                });
            }

            function processFieldData(data) {
                cropLocations = {};
                groupCrops = {};
                parsedFieldData = data;

                data.forEach(row => {
                    const bedNum = parseInt(row.Bed);
                    const grupo = row.Lugegruppe || '';
                    const frigivet = row.Frigivet || '0';
                    
                    const addCropLocation = (section, cropName, bedNumber, frigivet) => {
                        if (cropName && cropName !== 'Brak') {
                            if (!cropLocations[cropName]) cropLocations[cropName] = { T: [], M: [], B: [], frigivet: frigivet };
                            cropLocations[cropName][section].push({ bed: bedNumber, frigivet });
                            
                            if (grupo) {
                                if (!groupCrops[grupo]) groupCrops[grupo] = [];
                                groupCrops[grupo].push({ bed: bedNumber, section, crop: cropName });
                            }
                        }
                    };

                    addCropLocation('T', row.Top, bedNum, frigivet);
                    addCropLocation('M', row.Midt, bedNum, frigivet);
                    addCropLocation('B', row.Bund, bedNum, frigivet);
                });

                for (const cropName in cropLocations) {
                    ['T', 'M', 'B'].forEach(s => cropLocations[cropName][s].sort((a, b) => a.bed - b.bed));
                }
            }

            function renderCropList() {
                cropListContent.innerHTML = '';
                const sortedCropNames = Object.keys(cropLocations).sort();
                if (sortedCropNames.length === 0) {
                    cropListContent.innerHTML = '<div class="text-center py-4 text-gray-500">Ingen afgrøder fundet.</div>';
                    return;
                }

                sortedCropNames.forEach(cropName => {
                    const loc = cropLocations[cropName];
                    const frigivet = loc.frigivet;
                    const statusIcon = getStatusIcon(frigivet);
                    
                    const locations = [...new Set([...loc.T, ...loc.M, ...loc.B])];
                    const beds = locations.map(l => l.bed || l);
                    
                    const div = document.createElement('div');
                    div.className = 'crop-item';
                    div.innerHTML = `
                        <span class="crop-name">${cropName}</span>
                        <span class="crop-status">${statusIcon} (${beds.join(', ')})</span>
                    `;
                    div.dataset.cropName = cropName;
                    div.addEventListener('click', () => highlightCropInField(cropName));
                    cropListContent.appendChild(div);
                });
            }

            function renderGroupList() {
                groupListContent.innerHTML = '';
                const sortedGroups = Object.keys(groupCrops).sort((a, b) => parseInt(a) - parseInt(b));
                if (sortedGroups.length === 0) return;

                sortedGroups.forEach(grupo => {
                    const crops = groupCrops[grupo];
                    const uniqueCrops = [...new Set(crops.map(c => c.crop))].sort();
                    
                    const div = document.createElement('div');
                    div.className = 'crop-item';
                    div.innerHTML = `
                        <span class="crop-name">G${grupo}</span>
                        <span class="crop-status">${uniqueCrops.join(', ')}</span>
                    `;
                    div.dataset.grupo = grupo;
                    div.addEventListener('click', () => highlightGroup(grupo));
                    groupListContent.appendChild(div);
                });
            }

            function renderFieldOverview() {
                sectionT.innerHTML = '';
                sectionM.innerHTML = '';
                sectionB.innerHTML = '';

                const maxBedNum = parsedFieldData.reduce((max, row) => Math.max(max, parseInt(row.Bed || 0)), 0);

                for (let i = 1; i <= maxBedNum; i++) {
                    const bedData = parsedFieldData.find(row => parseInt(row.Bed) === i);
                    if (bedData) {
                        sectionT.appendChild(createBedElement('T', i, bedData.Top, bedData.Lugegruppe, bedData.Frigivet));
                        sectionM.appendChild(createBedElement('M', i, bedData.Midt, bedData.Lugegruppe, bedData.Frigivet));
                        sectionB.appendChild(createBedElement('B', i, bedData.Bund, bedData.Lugegruppe, bedData.Frigivet));
                    }
                }
            }

            function createBedElement(section, bedNum, cropName, grupo, frigivet) {
                const div = document.createElement('div');
                div.id = `bed-${section}-${bedNum}`;
                div.className = 'bed';
                div.dataset.section = section;
                div.dataset.bedNum = bedNum;
                div.dataset.cropName = cropName;
                div.dataset.frigivet = frigivet;
                
                const statusIcon = getStatusIcon(frigivet);
                const displayCrop = cropName && cropName !== 'Brak' ? `${cropName}<span class="status-icon">${statusIcon}</span>` : '';
                
                div.innerHTML = `
                    <span class="bed-number">${bedNum}</span>
                    ${grupo ? `<span class="bed-group">G${grupo}</span>` : ''}
                    <span class="bed-crop">${displayCrop}</span>
                `;
                return div;
            }

            function highlightCropInField(cropName) {
                document.querySelectorAll('.bed.highlight').forEach(b => b.classList.remove('highlight'));
                
                const loc = cropLocations[cropName];
                if (!loc) return;
                
                let first = null;
                ['T', 'M', 'B'].forEach(s => {
                    loc[s].forEach(item => {
                        const el = document.getElementById(`bed-${s}-${item.bed || item}`);
                        if (el) {
                            el.classList.add('highlight');
                            if (!first) first = el;
                        }
                    });
                });
                if (first) first.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            function highlightGroup(grupo) {
                document.querySelectorAll('.bed.highlight').forEach(b => b.classList.remove('highlight'));
                
                const crops = groupCrops[grupo];
                if (!crops) return;
                
                let first = null;
                crops.forEach(c => {
                    const el = document.getElementById(`bed-${c.section}-${c.bed}`);
                    if (el) {
                        el.classList.add('highlight');
                        if (!first) first = el;
                    }
                });
                if (first) first.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            function toggleSunlightMode() {
                if (body.classList.contains('theme-sunlight')) {
                    body.classList.remove('theme-sunlight');
                    body.classList.add('theme-default');
                    localStorage.setItem('sunlightMode', 'inactive');
                    sunModeButton.classList.remove('active');
                } else {
                    body.classList.remove('theme-default');
                    body.classList.add('theme-sunlight');
                    localStorage.setItem('sunlightMode', 'active');
                    sunModeButton.classList.add('active');
                }
            }

            sunModeButton.addEventListener('click', toggleSunlightMode);

            async function init() {
                setRandomEmojis();
                
                const savedSunlightMode = localStorage.getItem('sunlightMode') || 'inactive';
                if (savedSunlightMode === 'active') {
                    body.classList.add('theme-sunlight');
                    sunModeButton.classList.add('active');
                } else {
                    body.classList.add('theme-default');
                }

                const data = await fetchCsvData('markplan_aih.csv');
                if (data.length > 0) {
                    processFieldData(data);
                    renderCropList();
                    renderGroupList();
                    renderFieldOverview();
                }
            }

            init();
        });
    </script>
</body>
</html>
