<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markplan Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .admin-container { max-width: 800px; margin: 0 auto; padding: 1rem; }
        .crop-row { display: grid; grid-template-columns: 1fr 100px; gap: 0.5rem; padding: 1rem; background: white; border-radius: 0.5rem; margin-bottom: 0.5rem; align-items: center; }
        .crop-header { font-weight: bold; background: #065f46; color: white; padding: 1rem; border-radius: 0.5rem; }
        .lock-btn { cursor: pointer; padding: 0.5rem 1rem; border-radius: 0.5rem; text-align: center; font-size: 1.2rem; transition: all 0.2s; text-align: center; }
        .lock-btn.locked { background: #fef2f2; border: 2px solid #fecaca; }
        .lock-btn.unlocked { background: #f0fdf4; border: 2px solid #22c55e; }
        .action-btn { background: #10b981; color: white; padding: 1rem 2rem; border: none; border-radius: 0.5rem; font-size: 1.1rem; cursor: pointer; }
        .action-btn:hover { background: #059669; }
        .upload-btn { background: #3b82f6; color: white; padding: 1rem 2rem; border: none; border-radius: 0.5rem; font-size: 1.1rem; cursor: pointer; display: inline-block; }
        .upload-btn:hover { background: #2563eb; }
        .error { color: red; margin-top: 0.5rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="loginPage" class="login-container">
        <div class="bg-white p-8 rounded-lg shadow-lg text-center w-80">
            <h1 class="text-2xl font-bold mb-4 text-green-700">Markplan Admin</h1>
            <input type="password" id="passwordInput" placeholder="Kode" class="border p-2 rounded w-full mb-4 text-center">
            <button onclick="login()" class="bg-green-600 text-white px-6 py-2 rounded w-full">Login</button>
            <p id="loginError" class="error text-center mt-2">Forkert kode</p>
        </div>
    </div>

    <div id="adminPage" class="admin-container">
        <h1 class="text-3xl font-bold text-center mb-4 text-green-700">Markplan Admin</h1>
        
        <div class="flex justify-center gap-4 mb-6 flex-wrap">
            <button onclick="loadData()" class="action-btn">Vis afgrøder</button>
            <label class="action-btn upload-btn">
                Upload ny fil
                <input type="file" id="fileInput" accept=".csv" onchange="uploadFile()" style="display:none;">
            </label>
            <button onclick="logout()" class="bg-gray-500 text-white px-6 py-2 rounded">Logout</button>
        </div>
        
        <div id="cropList" class="bg-white p-4 rounded-lg shadow-lg">
            <div class="crop-row crop-header">
                <span>Afgrøde</span>
                <span>Frigivet</span>
            </div>
            <div id="cropContent"></div>
        </div>
        
        <div class="flex justify-center mt-6">
            <button onclick="saveChanges()" class="action-btn">Gem ændringer</button>
        </div>
        <p id="saveMessage" class="text-center mt-2 text-green-600 hidden">Ændringer gemt!</p>
    </div>

    <script>
        let fieldData = [];
        let cropStatus = {};
        let modified = {};

        function login() {
            const password = document.getElementById('passwordInput').value;
            if (password === 'aihmark') {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('adminPage').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function logout() {
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('adminPage').classList.add('hidden');
            document.getElementById('passwordInput').value = '';
        }

        async function loadData() {
            try {
                const response = await fetch('markplan_aih.csv');
                const text = await response.text();
                const lines = text.trim().split('\n');
                const headers = lines[0].split(',').map(h => h.trim());
                
                fieldData = lines.slice(1).map(line => {
                    const values = line.split(',').map(v => v.trim());
                    return headers.reduce((obj, h, i) => ({ ...obj, [h]: values[i] || '' }), {});
                });
                
                cropStatus = {};
                fieldData.forEach(row => {
                    const crop = row.Top || row.Midt || row.Bund;
                    if (crop && crop !== 'Brak' && crop !== '') {
                        const frigivet = row.Frigivet || '0';
                        if (!cropStatus[crop]) {
                            cropStatus[crop] = frigivet;
                        }
                    }
                });
                
                renderCropList();
            } catch (error) {
                alert('Kunne ikke indlæse data: ' + error.message);
            }
        }

        function renderCropList() {
            const container = document.getElementById('cropContent');
            container.innerHTML = '';
            
            const sortedCrops = Object.keys(cropStatus).sort();
            
            sortedCrops.forEach(crop => {
                const frigivet = cropStatus[crop];
                const icon = frigivet === '1' ? '✓' : '🔒';
                const lockClass = frigivet === '1' ? 'unlocked' : 'locked';
                
                const div = document.createElement('div');
                div.className = 'crop-row';
                div.innerHTML = `
                    <span class="font-medium">${crop}</span>
                    <span class="lock-btn ${lockClass}" onclick="toggleCrop('${crop}')">${icon}</span>
                `;
                container.appendChild(div);
            });
        }

        function toggleCrop(cropName) {
            const current = cropStatus[cropName] || '0';
            cropStatus[cropName] = current === '1' ? '0' : '1';
            modified[cropName] = true;
            renderCropList();
        }

        async function saveChanges() {
            try {
                fieldData.forEach(row => {
                    const crop = row.Top || row.Midt || row.Bund;
                    if (crop && crop !== 'Brak' && crop !== '' && modified[crop]) {
                        row.Frigivet = cropStatus[crop];
                    }
                });
                
                const lines = ['Bed,Top,Midt,Bund,Lugegruppe,Frigivet'];
                fieldData.forEach(row => {
                    if (row.Bed) {
                        lines.push(`${row.Bed},${row.Top},${row.Midt},${row.Bund},${row.Lugegruppe},${row.Frigivet}`);
                    }
                });
                
                const csvContent = lines.join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv' });
                
                const formData = new FormData();
                formData.append('file', blob, 'markplan_aih.csv');
                
                await fetch('markplan_aih.csv', {
                    method: 'POST',
                    body: formData
                });
                
                document.getElementById('saveMessage').classList.remove('hidden');
                setTimeout(() => document.getElementById('saveMessage').classList.add('hidden'), 3000);
                modified = {};
            } catch (error) {
                alert('Kunne ikke gemme: ' + error.message);
            }
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) return;
            
            if (!confirm('Er du sikker på at du vil uploade en ny fil? Den gamle fil vil blive gemt som backup.')) {
                fileInput.value = '';
                return;
            }
            
            try {
                const response = await fetch('markplan_aih.csv');
                const oldContent = await response.text();
                
                const timestamp = new Date().toISOString().replace(/[:-]/g,'').slice(0,14);
                const backupName = `markplan_backup_${timestamp}.csv`;
                
                const backupBlob = new Blob([oldContent], { type: 'text/csv' });
                await fetch(backupName, { method: 'POST', body: backupBlob });
                
                const newContent = await file.text();
                const newBlob = new Blob([newContent], { type: 'text/csv' });
                
                await fetch('markplan_aih.csv', { method: 'POST', body: newBlob });
                
                alert('Fil uploadet! Backup gemt som ' + backupName);
                fileInput.value = '';
                loadData();
            } catch (error) {
                alert('Kunne ikke uploade: ' + error.message);
            }
        }
    </script>
</body>
</html>
