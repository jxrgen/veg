<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markplan Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .admin-container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
        .bed-row { display: grid; grid-template-columns: 60px 1fr 1fr 1fr 80px 80px; gap: 0.5rem; padding: 0.75rem; background: white; border-radius: 0.5rem; margin-bottom: 0.5rem; align-items: center; }
        .bed-header { font-weight: bold; background: #065f46; color: white; }
        .lock-btn { cursor: pointer; padding: 0.5rem; border-radius: 0.5rem; text-align: center; font-size: 1.5rem; transition: all 0.2s; }
        .lock-btn.locked { background: #fef2f2; border: 2px solid #fecaca; }
        .lock-btn.unlocked { background: #f0fdf4; border: 2px solid #bbf7d0; }
        .save-btn { background: #10b981; color: white; padding: 1rem 2rem; border: none; border-radius: 0.5rem; font-size: 1.1rem; cursor: pointer; }
        .save-btn:hover { background: #059669; }
        .upload-btn { background: #3b82f6; color: white; padding: 1rem 2rem; border: none; border-radius: 0.5rem; font-size: 1.1rem; cursor: pointer; }
        .upload-btn:hover { background: #2563eb; }
        .error { color: red; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div id="loginPage" class="login-container">
        <div class="bg-white p-8 rounded-lg shadow-lg text-center">
            <h1 class="text-2xl font-bold mb-4 text-green-700">Markplan Admin</h1>
            <input type="password" id="passwordInput" placeholder="Kode" class="border p-2 rounded w-full mb-4 text-center">
            <button onclick="login()" class="bg-green-600 text-white px-6 py-2 rounded w-full">Login</button>
            <p id="loginError" class="error hidden">Forkert kode</p>
        </div>
    </div>

    <div id="adminPage" class="admin-container" style="display:none;">
        <h1 class="text-3xl font-bold text-center mb-4 text-green-700">Markplan Admin</h1>
        
        <div class="flex justify-center gap-4 mb-6">
            <button onclick="showData()" class="save-btn">Vis data</button>
            <label class="upload-btn cursor-pointer">
                Upload ny fil
                <input type="file" id="fileInput" accept=".csv" onchange="uploadFile()" style="display:none;">
            </label>
            <button onclick="logout()" class="bg-gray-500 text-white px-6 py-2 rounded">Logout</button>
        </div>
        
        <div id="bedList" class="bg-white p-4 rounded-lg shadow-lg">
            <div class="bed-row bed-header">
                <span>Bed</span>
                <span>Top</span>
                <span>Midt</span>
                <span>Bund</span>
                <span>Gruppe</span>
                <span>Status</span>
            </div>
            <div id="bedContent"></div>
        </div>
        
        <div class="flex justify-center mt-6">
            <button onclick="saveChanges()" class="save-btn">Gem ændringer</button>
        </div>
        <p id="saveMessage" class="text-center mt-2 text-green-600 hidden">Ændringer gemt!</p>
    </div>

    <script>
        let fieldData = [];
        let modified = {};

        function login() {
            const password = document.getElementById('passwordInput').value;
            if (password === 'aihmark') {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminPage').style.display = 'block';
                showData();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function logout() {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('adminPage').style.display = 'none';
            document.getElementById('passwordInput').value = '';
        }

        async function showData() {
            try {
                const response = await fetch('markplan_aih.csv');
                const text = await response.text();
                const lines = text.trim().split('\n');
                const headers = lines[0].split(',').map(h => h.trim());
                
                fieldData = lines.slice(1).map(line => {
                    const values = line.split(',').map(v => v.trim());
                    return headers.reduce((obj, h, i) => ({ ...obj, [h]: values[i] || '' }), {});
                });
                
                renderBedList();
            } catch (error) {
                alert('Kunne ikke indlæse data: ' + error.message);
            }
        }

        function renderBedList() {
            const container = document.getElementById('bedContent');
            container.innerHTML = '';
            
            fieldData.forEach((row, index) => {
                if (!row.Bed) return;
                
                const div = document.createElement('div');
                div.className = 'bed-row';
                
                const frigivet = row.Frigivet || '0';
                const lockIcon = frigivet === '1' ? '🔓' : '🔒';
                const lockClass = frigivet === '1' ? 'unlocked' : 'locked';
                
                div.innerHTML = `
                    <span class="font-bold">${row.Bed}</span>
                    <span>${row.Top || '-'}</span>
                    <span>${row.Midt || '-'}</span>
                    <span>${row.Bund || '-'}</span>
                    <span>${row.Lugegruppe || '-'}</span>
                    <span class="lock-btn ${lockClass}" onclick="toggleLock(${index})">${lockIcon}</span>
                `;
                container.appendChild(div);
            });
        }

        function toggleLock(index) {
            const current = fieldData[index].Frigivet || '0';
            fieldData[index].Frigivet = current === '1' ? '0' : '1';
            modified[index] = true;
            renderBedList();
        }

        async function saveChanges() {
            try {
                const lines = ['Bed,Top,Midt,Bund,Lugegruppe,Frigivet'];
                fieldData.forEach(row => {
                    if (row.Bed) {
                        lines.push(`${row.Bed},${row.Top},${row.Midt},${row.Bund},${row.Lugegruppe},${row.Frigivet}`);
                    }
                });
                
                const csv = lines.join('\n');
                const blob = new Blob([csv], { type: 'text/csv' });
                
                const response = await fetch('markplan_aih.csv', {
                    method: 'PUT',
                    body: blob
                });
                
                document.getElementById('saveMessage').classList.remove('hidden');
                setTimeout(() => document.getElementById('saveMessage').classList.add('hidden'), 3000);
                modified = {};
            } catch (error) {
                alert('Kunne ikke gemme: ' + error.message);
            }
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) return;
            
            if (!confirm('Er du sikker på at du vil uploade en ny fil? Den gamle fil vil blive gemt som backup.')) {
                fileInput.value = '';
                return;
            }
            
            try {
                const response = await fetch('markplan_aih.csv');
                const oldContent = await response.text();
                
                const timestamp = new Date().toISOString().slice(0,19).replace(/[:-]/g,'');
                const backupName = `markplan_backup_${timestamp}.csv`;
                
                await fetch(backupName, {
                    method: 'PUT',
                    body: oldContent
                });
                
                const newContent = await file.text();
                const blob = new Blob([newContent], { type: 'text/csv' });
                
                await fetch('markplan_aih.csv', {
                    method: 'PUT',
                    body: blob
                });
                
                alert('Fil uploadet! Backup gemt som ' + backupName);
                fileInput.value = '';
                showData();
            } catch (error) {
                alert('Kunne ikke uploade: ' + error.message);
            }
        }
    </script>
</body>
</html>
