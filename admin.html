<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markplan Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .admin-container { max-width: 900px; margin: 0 auto; padding: 1rem; }
        .crop-section { margin-bottom: 1.5rem; }
        .crop-header { font-weight: bold; background: #065f46; color: white; padding: 1rem; border-radius: 0.5rem 0.5rem 0 0; display: flex; justify-content: space-between; }
        .crop-list { background: white; border-radius: 0 0 0.5rem 0.5rem; padding: 0.5rem; }
        .crop-row { display: grid; grid-template-columns: 80px 1fr 90px; gap: 0.5rem; padding: 0.75rem; border-bottom: 1px solid #e5e7eb; align-items: center; }
        .crop-row:last-child { border-bottom: none; }
        .lock-btn { cursor: pointer; padding: 0.5rem; border-radius: 0.5rem; text-align: center; transition: all 0.2s; }
        .lock-btn.locked { background: #fef2f2; border: 2px solid #fecaca; }
        .lock-btn.unlocked { background: #f0fdf4; border: 2px solid #22c55e; }
        .action-btn { background: #10b981; color: white; padding: 1rem 2rem; border: none; border-radius: 0.5rem; font-size: 1.1rem; cursor: pointer; }
        .action-btn:hover { background: #059669; }
        .upload-btn { background: #3b82f6; color: white; padding: 1rem 2rem; border: none; border-radius: 0.5rem; font-size: 1.1rem; cursor: pointer; display: inline-block; }
        .upload-btn:hover { background: #2563eb; }
        .error { color: red; margin-top: 0.5rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="loginPage" class="login-container">
        <div class="bg-white p-8 rounded-lg shadow-lg text-center w-80">
            <h1 class="text-2xl font-bold mb-4 text-green-700">Markplan Admin</h1>
            <input type="password" id="passwordInput" placeholder="Kode" class="border p-2 rounded w-full mb-4 text-center">
            <button onclick="login()" class="bg-green-600 text-white px-6 py-2 rounded w-full">Login</button>
            <p id="loginError" class="error text-center mt-2">Forkert kode</p>
        </div>
    </div>

    <div id="adminPage" class="admin-container">
        <h1 class="text-3xl font-bold text-center mb-4 text-green-700">Markplan Admin</h1>
        
        <div class="flex justify-center gap-4 mb-6 flex-wrap">
            <button onclick="loadData()" class="action-btn">Vis afgrøder</button>
            <label class="action-btn upload-btn">
                Upload ny fil
                <input type="file" id="fileInput" accept=".csv" onchange="uploadFile()" style="display:none;">
            </label>
            <button onclick="logout()" class="bg-gray-500 text-white px-6 py-2 rounded">Logout</button>
        </div>
        
        <div id="contentArea"></div>
        
        <div class="flex justify-center mt-6">
            <button onclick="downloadCSV()" class="action-btn">Download ændringer</button>
        </div>
        <p id="saveMessage" class="text-center mt-2 text-green-600 hidden">Klar til download!</p>
    </div>

    <script>
        let fieldData = [];
        let changes = {};

        function login() {
            if (document.getElementById('passwordInput').value === 'aihmark') {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('adminPage').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function logout() {
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('adminPage').classList.add('hidden');
            document.getElementById('passwordInput').value = '';
        }

        async function loadData() {
            try {
                const response = await fetch('markplan_aih.csv');
                const text = await response.text();
                const lines = text.trim().split('\n');
                const headers = lines[0].split(',').map(h => h.trim());
                
                fieldData = lines.slice(1).map(line => {
                    const values = line.split(',').map(v => v.trim());
                    return headers.reduce((obj, h, i) => ({ ...obj, [h]: values[i] || '' }), {});
                });
                
                changes = {};
                renderAllCrops();
            } catch (error) {
                alert('Kunne ikke indlæse: ' + error.message);
            }
        }

        function renderAllCrops() {
            const area = document.getElementById('contentArea');
            area.innerHTML = '';
            
            const cropsBySection = { Top: {}, Midt: {}, Bund: {} };
            const groupFields = { Top: 'TopGruppe', Midt: 'MidtGruppe', Bund: 'BundGruppe' };
            const frigivFields = { Top: 'TopFrigivet', Midt: 'MidtFrigivet', Bund: 'BundFrigivet' };
            const cropFields = { Top: 'Top', Midt: 'Midt', Bund: 'Bund' };
            
            fieldData.forEach(row => {
                ['Top', 'Midt', 'Bund'].forEach(sec => {
                    const crop = row[cropFields[sec]];
                    const grupo = row[groupFields[sec]];
                    const frigivet = row[frigivFields[sec]] || '0';
                    
                    if (crop && crop !== 'Brak' && crop !== '') {
                        const key = sec + '|' + crop;
                        if (!cropsBySection[sec][crop]) {
                            cropsBySection[sec][crop] = { grupo, frigivet, beds: [] };
                        }
                        cropsBySection[sec][crop].beds.push(row.Bed);
                    }
                });
            });
            
            ['Top', 'Midt', 'Bund'].forEach(sec => {
                const section = cropsBySection[sec];
                const sorted = Object.keys(section).sort();
                
                const div = document.createElement('div');
                div.className = 'crop-section';
                
                const header = document.createElement('div');
                header.className = 'crop-header';
                header.innerHTML = `<span>${sec === 'Top' ? 'Top' : sec === 'Midt' ? 'Midt' : 'Bund'}-afsnit</span><span>Gruppe/Status</span>`;
                div.appendChild(header);
                
                const list = document.createElement('div');
                list.className = 'crop-list';
                
                sorted.forEach(crop => {
                    const data = section[crop];
                    const icon = data.frigivet === '1' ? '✓' : '🔒';
                    const lockClass = data.frigivet === '1' ? 'unlocked' : 'locked';
                    
                    const row = document.createElement('div');
                    row.className = 'crop-row';
                    row.innerHTML = `
                        <span>${crop}</span>
                        <span class="text-sm text-gray-500">Bed ${data.beds.join(', ')}</span>
                        <span class="lock-btn ${lockClass}" data-section="${sec}" data-crop="${crop}">${icon}</span>
                    `;
                    row.querySelector('.lock-btn').onclick = () => toggleCrop(sec, crop);
                    list.appendChild(row);
                });
                
                div.appendChild(list);
                area.appendChild(div);
            });
        }

        function toggleCrop(section, cropName) {
            const key = section + '|' + cropName;
            if (changes[key] === undefined) {
                const cropFields = { Top: 'Top', Midt: 'Midt', Bund: 'Bund' };
                const frigivFields = { Top: 'TopFrigivet', Midt: 'MidtFrigivet', Bund: 'BundFrigivet' };
                
                fieldData.forEach(row => {
                    if (row[cropFields[section]] === cropName) {
                        if (!changes[key]) changes[key] = row[frigivFields[section]] || '0';
                    }
                });
            }
            
            changes[key] = changes[key] === '1' ? '0' : '1';
            renderAllCrops();
        }

        function downloadCSV() {
            const cropFields = { Top: 'Top', Midt: 'Midt', Bund: 'Bund' };
            const frigivFields = { Top: 'TopFrigivet', Midt: 'MidtFrigivet', Bund: 'BundFrigivet' };
            
            fieldData.forEach(row => {
                ['Top', 'Midt', 'Bund'].forEach(sec => {
                    const cropName = row[cropFields[sec]];
                    const key = sec + '|' + cropName;
                    if (changes[key]) {
                        row[frigivFields[sec]] = changes[key];
                    }
                });
            });
            
            const lines = ['Bed,Top,TopGruppe,TopFrigivet,Midt,MidtGruppe,MidtFrigivet,Bund,BundGruppe,BundFrigivet'];
            fieldData.forEach(row => {
                if (row.Bed) {
                    lines.push(`${row.Bed},${row.Top},${row.TopGruppe || ''},${row.TopFrigivet || '0'},${row.Midt},${row.MidtGruppe || ''},${row.MidtFrigivet || '0'},${row.Bund},${row.BundGruppe || ''},${row.BundFrigivet || '0'}`);
                }
            });
            
            const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'markplan_aih.csv';
            a.click();
            
            document.getElementById('saveMessage').classList.remove('hidden');
            setTimeout(() => document.getElementById('saveMessage').classList.add('hidden'), 3000);
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) return;
            
            if (!confirm('Er du sikker på at du vil uploade en ny fil? Den gamle fil downloades som backup.')) {
                fileInput.value = '';
                return;
            }
            
            try {
                const response = await fetch('markplan_aih.csv');
                const oldContent = await response.text();
                
                const timestamp = new Date().toISOString().replace(/[:-]/g,'').slice(0,14);
                const backupBlob = new Blob([oldContent], { type: 'text/csv' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(backupBlob);
                a.download = `markplan_backup_${timestamp}.csv`;
                a.click();
                
                const newContent = await file.text();
                const newBlob = new Blob([newContent], { type: 'text/csv' });
                const b = document.createElement('a');
                b.href = URL.createObjectURL(newBlob);
                b.download = 'markplan_aih.csv';
                b.click();
                
                alert('Fil uploadet! Download den nye fil og erstat den eksisterende på GitHub.');
                fileInput.value = '';
            } catch (error) {
                alert('Kunne ikke uploade: ' + error.message);
            }
        }
    </script>
</body>
</html>
